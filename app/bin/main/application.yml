spring:
  application:
    name: ticket-booking-system
  
  datasource:
    url: jdbc:mysql://localhost:3306/ticket_booking
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    context-path: /api

logging:
  level:
    root: INFO
    ticket.booking: DEBUG
    org.hibernate.SQL: DEBUG

security:
  jwt:
    secret: ${JWT_SECRET:ticket-booking-development-jwt-secret-key-change-me-123456}
    expiration-ms: 86400000
